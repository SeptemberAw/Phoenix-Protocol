
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PUREX PROTOCOL</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#050505',
              surface: '#0D0D0D',
              card: '#111111',
              primary: '#FF3B00',
              'primary-dark': '#CC2F00',
              secondary: '#FFFFFF',
              muted: '#4A4A4A',
              grid: '#1A1A1A',
            },
            fontFamily: {
              sans: ['"Space Grotesk"', 'sans-serif'],
              ui: ['"Inter"', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            animation: {
              'scan-laser': 'scan-laser 8s infinite cubic-bezier(0.4, 0, 0.2, 1)',
              'scale-up': 'scale-up 0.2s ease-out forwards',
              'progress': 'progress 2.5s ease-in-out infinite',
              'slide-down': 'slideDown 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.3s ease-out forwards',
            },
            keyframes: {
              'scale-up': {
                '0%': { transform: 'scale(0.95)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              },
              'slideDown': {
                '0%': { transform: 'translateY(-20px)', opacity: '0', maxHeight: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1', maxHeight: '100px' },
              },
              'slideUp': {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #050505;
        color: #e0e0e0;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      .noise-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
      }
      ::-webkit-scrollbar { display: none; }
      .shadow-glow-orange {
        box-shadow: 0 0 15px rgba(255, 59, 0, 0.2);
      }
      .drop-shadow-glow {
        filter: drop-shadow(0 0 10px rgba(255, 59, 0, 0.5));
      }
    </style>
      </head>
  <body>
    <div id="root"></div>
    <div class="noise-overlay"></div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="index.tsx?v=13"></script>
  </body>
</html>
